<header class="navbar">
  <img src="assets/logo.png" alt="DosPros" class="navbar-logo">
  <h1 class="navbar-title">{{ title }}</h1>

  <!-- Notification bell — messagerie EM <-> clients (ENTITY_MANAGER uniquement) -->
  <div class="navbar-notif" *ngIf="showNotifBell">
    <button class="notif-bell-btn" (click)="toggleNotif()" title="Notifications">
      <span class="material-icons">notifications</span>
      <span class="notif-badge" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
    </button>
    <div class="notif-dropdown" *ngIf="notifOpen">
      <div class="notif-dropdown-header">Notifications</div>
      <p class="notif-empty" *ngIf="!unreadMessages.length">Aucune notification pour le moment.</p>
      <a class="notif-item" *ngFor="let m of unreadMessages" (click)="goToMessage()">
        <span class="material-icons notif-item-icon">mail</span>
        <span class="notif-item-subject">{{ m.subject }}</span>
      </a>
      <div class="notif-dropdown-footer" *ngIf="unreadMessages.length">
        <a (click)="goToMessage()">Voir tous les messages</a>
      </div>
    </div>
  </div>

  <!-- EM entity chip — top right -->
  <div class="em-entity-chip"
       *ngIf="role === Role.ENTITY_MANAGER && emSession.isSelected">
    <span class="material-icons chip-icon">corporate_fare</span>
    <div class="chip-info">
      <span class="chip-name">{{ emSession.entity?.name }}</span>
      <span class="chip-code">{{ emSession.entity?.code }}</span>
    </div>
    <button class="chip-change-btn" [disabled]="!canSwitchEntity" (click)="changeEntity()"
      [title]="canSwitchEntity ? 'Changer d\'entité' : 'Indisponible : ce rôle ne gère qu\'une seule entité'">
      <span class="material-icons" style="font-size:18px">swap_horiz</span>
    </button>
  </div>
</header>
