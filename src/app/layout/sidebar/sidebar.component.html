<aside class="sidebar">
  <div class="sidebar-logo">
    <span class="logo-icon">📁</span>
    <span class="logo-text">DossierPro</span>
  </div>

  <div class="sidebar-user" *ngIf="user">
    <div class="user-avatar">{{ user.firstName?.[0] ?? user.uniqueReference[0] | uppercase }}</div>
    <div class="user-info">
      <div class="user-name">{{ user.firstName ?? user.uniqueReference }}</div>
      <div class="user-role">
        <span class="badge" [ngClass]="{'badge-admin': user.role===Role.ADMIN, 'badge-em': user.role===Role.ENTITY_MANAGER, 'badge-active': user.role===Role.USER}">
          {{ user.role }}
        </span>
      </div>
    </div>
  </div>

  <hr class="sidebar-divider">

  <nav class="sidebar-nav">
    <!-- ADMIN -->
    <ng-container *ngIf="user?.role === Role.ADMIN">
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a routerLink="/admin/entities" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🏢</span> Entités
      </a>
      <a routerLink="/admin/entity-managers" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">👔</span> Entity Managers
      </a>
    </ng-container>

    <!-- ENTITY_MANAGER -->
    <ng-container *ngIf="user?.role === Role.ENTITY_MANAGER">
      <a routerLink="/em/dashboard" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a routerLink="/em/info" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">ℹ️</span> Mes Informations
      </a>
      <a routerLink="/em/users" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">👥</span> Utilisateurs
      </a>
      <a routerLink="/em/dossiers" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📋</span> Dossiers
      </a>
    </ng-container>

    <!-- USER -->
    <ng-container *ngIf="user?.role === Role.USER">
      <a routerLink="/user/dossiers" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📋</span> Mes Dossiers
      </a>
      <a routerLink="/user/profile" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">👤</span> Mon Profil
      </a>
      <a routerLink="/user/preferences" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">⚙️</span> Préférences
      </a>
    </ng-container>
  </nav>

  <div class="sidebar-footer">
    <button class="nav-item logout-btn" (click)="logout()">
      <span class="nav-icon">🚪</span> Déconnexion
    </button>
  </div>
</aside>
