<div class="login-page">
  <div class="login-box">
    <div class="login-header">
      <div class="login-logo">🔒</div>
      <h1>Changer le mot de passe</h1>
      <p>Première connexion détectée. Veuillez définir un nouveau mot de passe.</p>
    </div>
    <div class="alert alert-success" *ngIf="success">{{ success }}</div>
    <div class="alert alert-error" *ngIf="error">{{ error }}</div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">Mot de passe actuel</label>
        <input class="form-control" type="password" formControlName="currentPassword" placeholder="••••••">
      </div>
      <div class="form-group">
        <label class="form-label">Nouveau mot de passe</label>
        <input class="form-control" type="password" formControlName="newPassword" placeholder="Min. 4 caractères">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmer le mot de passe</label>
        <input class="form-control" type="password" formControlName="confirmPassword" placeholder="••••••">
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-secondary" type="button" (click)="skip()" style="flex:1">Plus tard</button>
        <button class="btn btn-primary" type="submit" [disabled]="loading" style="flex:2;justify-content:center">
          {{ loading ? 'Enregistrement...' : 'Confirmer' }}
        </button>
      </div>
    </form>
  </div>
</div>
