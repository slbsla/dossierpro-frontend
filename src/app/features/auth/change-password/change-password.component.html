<div class="login-page">
  <div class="login-box" style="max-width:440px">

    <div class="login-header">
      <div style="width:56px;height:56px;border-radius:50%;background:#eff6ff;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
        <span class="material-icons" style="font-size:28px;color:#2563eb">lock_reset</span>
      </div>
      <h1>Première connexion</h1>
      <p>Bienvenue ! Veuillez définir votre mot de passe pour continuer.</p>
    </div>

    <!-- Info : peut garder le même -->
    <div class="info-banner">
      <span class="material-icons" style="font-size:16px;flex-shrink:0">info_outline</span>
      <span>Vous pouvez conserver le mot de passe fourni par votre manager ou en choisir un nouveau.</span>
    </div>

    <div class="alert alert-success" *ngIf="success">{{ success }}</div>
    <div class="alert alert-error" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">Mot de passe actuel</label>
        <div class="input-password-wrapper">
          <input class="form-control" [type]="showCurrent ? 'text' : 'password'" formControlName="currentPassword" placeholder="Mot de passe reçu de votre manager">
          <button type="button" class="btn-eye" (click)="showCurrent=!showCurrent" tabindex="-1">
            <span class="material-icons" style="font-size:18px">{{ showCurrent ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Nouveau mot de passe</label>
        <div class="input-password-wrapper">
          <input class="form-control" [type]="showNew ? 'text' : 'password'" formControlName="newPassword" placeholder="Min. 4 caractères (peut être identique)">
          <button type="button" class="btn-eye" (click)="showNew=!showNew" tabindex="-1">
            <span class="material-icons" style="font-size:18px">{{ showNew ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
        <small *ngIf="form.get('newPassword')?.invalid && form.get('newPassword')?.touched" style="color:var(--danger);font-size:12px">Minimum 4 caractères requis.</small>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmer le mot de passe</label>
        <div class="input-password-wrapper">
          <input class="form-control" [type]="showConfirm ? 'text' : 'password'" formControlName="confirmPassword" placeholder="••••••">
          <button type="button" class="btn-eye" (click)="showConfirm=!showConfirm" tabindex="-1">
            <span class="material-icons" style="font-size:18px">{{ showConfirm ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
      </div>

      <button class="btn btn-primary" type="submit" [disabled]="loading || form.invalid" style="width:100%;justify-content:center;padding:12px;margin-top:4px">
        <span class="material-icons" style="font-size:16px;vertical-align:middle;margin-right:6px">check_circle</span>
        {{ loading ? 'Enregistrement...' : 'Confirmer et accéder à mon espace' }}
      </button>
    </form>

  </div>
</div>
