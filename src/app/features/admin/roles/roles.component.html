<app-navbar title="Rôles"></app-navbar>
<div class="page-content">
  <div class="page-header">
    <div><h2 class="page-title">Rôles</h2><p class="page-subtitle">{{ roles.length }} rôle(s)</p></div>
  </div>

  <div class="alert alert-error" *ngIf="error">{{ error }}</div>

  <div class="card">
    <div *ngIf="loading" class="loading"><div class="spinner"></div></div>
    <div class="table-wrapper" *ngIf="!loading">
      <table>
        <thead><tr><th class="col-check"></th><th>Nom</th><th>Signification</th></tr></thead>
        <tbody>
          <tr *ngFor="let r of roles" [class.row-selected]="isSelected(r)" (click)="selectRow(r)">
            <td class="col-check" (click)="$event.stopPropagation()">
              <input type="checkbox" class="row-checkbox" [checked]="isSelected(r)" (change)="selectRow(r)">
            </td>
            <td><strong>{{ r.name }}</strong></td>
            <td>{{ r.description }}</td>
          </tr>
          <tr *ngIf="roles.length === 0"><td colspan="3" class="empty-state"><p>Aucun rôle</p></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
