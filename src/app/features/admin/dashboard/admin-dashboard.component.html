<app-navbar title="Dashboard Admin"></app-navbar>
<div class="page-content">
  <div class="page-header"><div><h2 class="page-title">Dashboard</h2><p class="page-subtitle">Vue d'ensemble de la plateforme</p></div></div>
  <div *ngIf="loading" class="loading"><div class="spinner"></div></div>
  <ng-container *ngIf="!loading && dashboard">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon">🏢</div><div class="stat-value">{{ dashboard.totalEntities }}</div><div class="stat-label">Entités</div></div>
      <div class="stat-card"><div class="stat-icon">👔</div><div class="stat-value">{{ dashboard.totalEntityManagers }}</div><div class="stat-label">Entity Managers</div></div>
      <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value">{{ dashboard.totalUsers }}</div><div class="stat-label">Utilisateurs</div></div>
      <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-value">{{ dashboard.totalDossiers }}</div><div class="stat-label">Dossiers Total</div></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Dossiers par statut</span></div>
      <div class="status-grid">
        <div class="status-item" *ngFor="let s of getStatusEntries()">
          <span class="badge" [ngClass]="'badge-' + s[0].toLowerCase()">{{ s[0] }}</span>
          <span class="status-count">{{ s[1] }}</span>
        </div>
      </div>
    </div>
  </ng-container>
</div>
<style>
.status-grid { display: flex; flex-wrap: wrap; gap: 16px; padding: 8px 0; }
.status-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--gray-light); border-radius: var(--radius-sm); }
.status-count { font-size: 20px; font-weight: 700; color: var(--text-dark); }
</style>
